name: Korea Market Wrap — Daily Build

on:
  schedule:
    # 16:00 KST = 07:00 UTC, Mon–Fri
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install finance-datareader requests beautifulsoup4 lxml

      - name: Run build script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_and_build.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs/
          echo "=== Staged changes ==="
          git diff --cached --stat
          DATE=$(TZ=Asia/Seoul date +"%Y-%m-%d %H:%M KST")
          git diff --cached --quiet || git commit -m "📊 Market wrap — ${DATE}"
          git pull --rebase origin main || true
          git push
