name: Korea Market Wrap — Daily Build

on:
  schedule:
    - cron: "0 7 * * 1-5"   # 07:00 UTC = 16:00 KST 월~금 (장 마감 30분 후)
  workflow_dispatch:

jobs:
  build:
    name: Fetch & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            pykrx \
            yfinance \
            pandas \
            requests \
            lxml \
            html5lib \
            beautifulsoup4

      - name: Fetch & Build HTML
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "▶ $(TZ='Asia/Seoul' date) — Build start"
          python scripts/fetch_and_build.py
          echo "▶ $(TZ='Asia/Seoul' date) — Build done"

      - name: Validate output snapshot
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path('docs/market_data.json')
          data = json.loads(p.read_text(encoding='utf-8'))

          market = data.get('market', {})
          market_ok = any((market.get(k, {}) or {}).get('value') not in ('—', '', None) for k in ('kospi', 'kosdaq', 'usdkrw'))
          movers_ok = bool(data.get('gainers') or data.get('losers'))

          if not (market_ok or movers_ok):
            raise SystemExit('❌ market_data.json is empty (no market values and no movers).')

          print('✅ snapshot validation passed')
          PY

      - name: Commit & Push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "daily: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          git push
